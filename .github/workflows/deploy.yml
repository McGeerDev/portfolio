name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for recent commits (scheduled runs only)
        id: check
        if: github.event_name == 'schedule'
        run: |
          RECENT=$(git log --since="24 hours ago" --oneline)
          if [ -z "$RECENT" ]; then
            echo "No commits in last 24h, skipping"
            echo "has_commits=false" >> $GITHUB_OUTPUT
          else
            echo "has_commits=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'schedule' || steps.check.outputs.has_commits == 'true'
        with:
          path: static-build

  deploy:
    needs: build
    if: github.event_name != 'schedule' || needs.build.outputs.has_commits == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
